<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Too Thirsty</title>
<meta name="description" content="Too Thirsty Dating Show London. Click to get tickets!">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZG530ZXYP6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ZG530ZXYP6');
</script>

<style>
  *{
    box-sizing:border-box;
  }

  html,body{
    margin:0;
    padding:0;
    color:#111;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.4;
    background:#000 url('repeat.webp') repeat;
  }

  img{
    display:block;
    max-width:100%;
    height:auto;
  }

  a{
    color:#56BFF9;
    text-decoration:none;
  }

  a:hover{
    text-decoration:underline;
  }

  .page{
    width:100%;
  }

  .desktop-layout{
    display:block;
    position:relative;
    width:100%;
    min-height:100vh;
    background:black url('background.webp') no-repeat top center;
    background-size:100% auto;
    overflow:hidden;
  }

  .desktop-links{
    position:absolute;
    top:30px;
    right:30px;
    text-align:right;
    z-index:10;
  }

  .desktop-links a{
    display:block;
    color:#FFEF00;
    font-weight:700;
    font-size:18px;
    line-height:1.4;
    margin-bottom:6px;
    text-decoration:none;
  }

  .desktop-links a:hover{
    color:#56BFF9;
    text-decoration:none;
  }

  .desktop-faq{
    position:absolute;
    top:123px;
    right:30px;
    width:clamp(400px, 51vw, 582px);
    max-height:calc(100vh - 140px);
    overflow:auto;
    padding:28px 30px 10px;
    background:rgba(0,0,0,0.9);
    color:#fff;
  }

  .desktop-faq h2,
  .mobile-faq h2{
    font-size:28px;
    font-weight:800;
    margin:0 0 20px;
    letter-spacing:-0.02em;
    color:#F8F057;
  }

  .desktop-faq details,
  .mobile-faq details{
    border-bottom:1px solid #333;
    padding:16px 0;
  }

  .desktop-faq summary,
  .mobile-faq summary{
    cursor:pointer;
    font-size:18px;
    font-weight:700;
    line-height:1.4;
    list-style:none;
    position:relative;
    padding-right:26px;
    color:#F8F057;
  }

  .desktop-faq summary::-webkit-details-marker,
  .mobile-faq summary::-webkit-details-marker{
    display:none;
  }

  .desktop-faq summary::after,
  .mobile-faq summary::after{
    content:"+";
    position:absolute;
    right:0;
    top:0;
    font-size:22px;
  }

  .desktop-faq details[open] summary::after,
  .mobile-faq details[open] summary::after{
    content:"−";
  }

  .desktop-faq p,
  .mobile-faq p{
    font-size:16px;
    line-height:1.65;
    color:#ddd;
    margin:10px 0 0;
  }

  .mobile-layout{
    display:none;
    width:100%;
    background:#000;
  }

  .mobile-page{
    width:100%;
    max-width:390px;
    margin:0 auto;
  }

  .mobile-header{
    display:block;
    width:100%;
    max-width:390px;
    margin:0 auto;
  }

  .mobile-header img{
    display:block;
    width:100%;
    height:auto;
  }

  .mobile-faq{
    margin:0 auto 30px;
    max-width:390px;
    padding:20px;
    background:#000;
    color:#fff;
  }

  .hero-link{
    display:block;
  }

  @media (max-width:780px){
    html,body{
      background:#000;
    }

    .desktop-layout{
      display:none;
    }

    .mobile-layout{
      display:block;
    }

    .mobile-faq h2{
      font-size:24px;
    }

    .mobile-faq summary{
      font-size:17px;
    }

    .mobile-faq p{
      font-size:15px;
      line-height:1.7;
    }
  }
</style>

<body>
  <main class="page">

    <div class="desktop-layout">
      <div class="desktop-links">
        <a href="https://tickets.toothirsty.com/">BUY TICKETS</a>
    
        <a href="https://wa.me/447544856788">SEND US A MESSAGE</a>
      </div>

      <section class="desktop-faq">
        <div class="faq-container"></div>
      </section>
    </div>

    <div class="mobile-layout">
      <div class="mobile-page">
        <div class="mobile-header">
          <img
            class="hero"
            src="1-HEADER.webp"
            alt="Too Thirsty"
            width="390"
            height="617"
            loading="eager"
            fetchpriority="high">

          <a href="https://tickets.toothirsty.com/" class="hero-link">
            <img
              class="hero"
              src="2-BUY-TICKETS.webp"
              alt="Buy Tickets"
              width="390"
              height="184">
          </a>
        </div>

        <section class="mobile-faq">
          <div class="faq-container"></div>
        </section>
      </div>
    </div>

  </main>

  <script src="faq-content.js"></script>
  <script>
    document.querySelectorAll('.faq-container').forEach(function(container) {
      container.innerHTML = window.faqContent || '';
    });
  </script>
</body>
</html>
